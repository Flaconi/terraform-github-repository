name: Flaconi Github Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review:
    uses: Flaconi/github-actions/.github/workflows/github-code-review.yml@v1
    secrets:
      gh_token: ${{ secrets.REPO_READ_TOKEN }}
      gh_copilot_token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      npm_token: ${{ secrets.NPM_TOKEN }}
